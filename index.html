<!DOCTYPE html>
<html lang="de" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRISTINA BEAUTY | Wedel - Wimpern, Skin Care & PMU</title>
    
    <meta name="description" content="Kristina Beauty in Wedel - Professionelle Wimpernverlängerung, Microneedling, Aquafacial und Permanent Make-up. Jetzt Termin buchen!">
    <meta property="og:title" content="KRISTINA BEAUTY | Wedel">
    <meta property="og:image" content="https://s1.directupload.eu/images/260405/vj8n3xz8.png">
    
    <link rel="icon" type="image/png" href="https://s1.directupload.eu/images/260405/vj8n3xz8.png">
    <link rel="apple-touch-icon" href="https://s1.directupload.eu/images/260405/vj8n3xz8.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#FAF9F6',
                            beige: '#E5D3B3',
                            gold: '#C5A880',
                            dark: '#000000',
                            muted: '#4B4B4B'
                        }
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* [Deine CSS Styles bleiben hier unverändert, da sie exzellent sind] */
        #intro-loader { position: fixed; inset: 0; z-index: 9999; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        #intro-loader::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(197,168,128,0.08) 0%, transparent 70%); animation: ambientPulse 3s ease-in-out infinite; }
        @keyframes ambientPulse { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }
        #intro-loader::after { content: ''; position: absolute; top: -2px; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent 0%, rgba(197,168,128,0.6) 50%, transparent 100%); animation: scanLine 2.2s cubic-bezier(0.4,0,0.2,1) 0.3s forwards; opacity: 0; }
        @keyframes scanLine { 0% { top: -2px; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        #intro-center { position: relative; z-index: 3; display: flex; flex-direction: column; align-items: center; gap: 0; }
        #intro-ring { position: relative; width: 160px; height: 160px; display: flex; align-items: center; justify-content: center; opacity: 0; transform: scale(0.7); animation: ringReveal 0.9s cubic-bezier(0.34, 1.4, 0.64, 1) 0.5s forwards; }
        @keyframes ringReveal { to { opacity: 1; transform: scale(1); } }
        #intro-logo-img { width: 100px; filter: brightness(0) invert(1); position: relative; z-index: 2; }
        #intro-divider { width: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(197,168,128,0.8), transparent); margin: 1.8rem 0 1.4rem; animation: drawLine 0.8s ease 1.1s forwards; }
        @keyframes drawLine { to { width: 120px; } }
        #intro-name { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 400; letter-spacing: 0.08em; color: #fff; opacity: 0; transform: translateY(12px); animation: textRise 0.7s ease 1.0s forwards; }
        #intro-tagline { font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 0.55em; text-transform: uppercase; color: rgba(197,168,128,0.85); opacity: 0; transform: translateY(8px); animation: textRise 0.6s ease 1.25s forwards; }
        @keyframes textRise { to { opacity: 1; transform: translateY(0); } }
        #intro-progress { position: absolute; bottom: 0; left: 0; height: 2px; width: 0%; background: linear-gradient(90deg, transparent, #C5A880, rgba(197,168,128,0.5)); animation: progressFill 1.8s cubic-bezier(0.4, 0, 0.2, 1) 0.4s forwards; }
        @keyframes progressFill { to { width: 100%; } }
        #intro-loader.exiting { animation: loaderExit 0.7s cubic-bezier(0.4, 0, 1, 1) forwards; }
        @keyframes loaderExit { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(1.06); pointer-events: none; } }
        #intro-loader.finished { display: none; }
        
        /* Weitere Styles gekürzt für die Übersicht, im Original beibehalten */
        body { background-color: #FAF9F6; color: #000000; -webkit-font-smoothing: antialiased; overflow-x: hidden; font-family: 'Montserrat', sans-serif; user-select: none; }
        .page-section { display: none; opacity: 0; }
        .page-section.active { display: block; opacity: 1; }
        .reveal-item { opacity: 0; transform: translateY(40px); transition: opacity 0.7s ease, transform 0.7s cubic-bezier(0.34,1.2,0.64,1); }
        .reveal-item.revealed { opacity: 1; transform: translateY(0); }
        .btn-beige { background: #D4BC96; color: white; letter-spacing: 0.3em; text-transform: uppercase; font-size: 11px; font-weight: 600; padding: 1.25rem 2rem; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; min-width: 220px; transition: all 0.5s ease; cursor: pointer; position: relative; overflow: hidden; }
        .btn-beige:hover { background: #C5A880; transform: translateY(-5px); }
        .nav-logo-img { height: 50px; width: auto; transition: height 0.3s ease; }
        @media (min-width: 768px) { .nav-logo-img { height: 70px; } }
    </style>
</head>
<body class="flex flex-col min-h-screen">

<div id="intro-loader">
    <div id="intro-center">
        <div id="intro-ring">
            <img id="intro-logo-img" src="https://s1.directupload.eu/images/260405/vj8n3xz8.png" alt="Kristina Beauty Logo">
        </div>
        <div id="intro-divider"></div>
        <div id="intro-name">Kristina Beauty</div>
        <div id="intro-tagline">Beauty · Wedel</div>
    </div>
    <div id="intro-progress"></div>
</div>

<nav class="fixed w-full z-[100] bg-white/95 backdrop-blur-xl border-b border-gray-100" id="navbar">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16 md:h-24">
            <a href="#" onclick="navigateTo('home'); return false;">
                <img src="https://s1.directupload.eu/images/260405/vj8n3xz8.png" alt="Logo" class="nav-logo-img">
            </a>
            <div class="hidden md:flex space-x-8">
                <a href="#" onclick="navigateTo('home'); return false;" class="text-[10px] font-bold tracking-widest uppercase hover:text-brand-gold">Studio</a>
                <a href="#" onclick="navigateTo('treatments'); return false;" class="text-[10px] font-bold tracking-widest uppercase hover:text-brand-gold">Preisliste</a>
                <a href="#" onclick="navigateTo('booking'); return false;" class="text-[10px] font-bold tracking-widest uppercase hover:text-brand-gold">Buchung</a>
                <a href="#" onclick="navigateTo('contact'); return false;" class="text-[10px] font-bold tracking-widest uppercase hover:text-brand-gold">Kontakt</a>
            </div>
            <button id="mobile-menu-btn" class="md:hidden p-2"><i class="fas fa-bars-staggered"></i></button>
        </div>
    </div>
</nav>

<main class="flex-grow pt-16 md:pt-24">
    <section id="page-home" class="page-section active">
        <div class="h-[80vh] relative flex items-center justify-center bg-black overflow-hidden">
            <div class="absolute inset-0 bg-[url('https://s1.directupload.eu/images/260401/h9ag4qr9.jpg')] bg-cover bg-center opacity-60"></div>
            <div class="relative z-10 text-center">
                <div class="flex flex-col md:flex-row gap-4">
                    <button onclick="navigateTo('treatments')" class="btn-beige">Preisliste</button>
                    <button onclick="navigateTo('booking')" class="btn-beige border border-white bg-transparent">Termin buchen</button>
                </div>
            </div>
        </div>
    </section>

    <section id="page-treatments" class="page-section">
        <div class="py-24 max-w-7xl mx-auto px-6">
            <h2 class="font-serif text-4xl text-center mb-12">Unsere Preise</h2>
            <div id="full-price-list" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </div>
    </section>

    <section id="page-booking" class="page-section">
        <div class="py-24 text-center">
            <h2 class="font-serif text-3xl mb-8">Sichere dir deinen Termin</h2>
            <a href="https://beautinda.de/artist/ObQbXZKAv9f5lrzYyitvlUNmkK03" target="_blank" class="btn-beige !bg-black">Zu Beautinda</a>
        </div>
    </section>

    <section id="page-contact" class="page-section">
        <div class="py-24 max-w-3xl mx-auto px-6 text-center">
            <h2 class="font-serif text-3xl mb-4">Kontakt</h2>
            <p>Werkstraße 10, 22880 Wedel</p>
            <p class="mt-4 text-brand-gold font-bold">0177 7743593</p>
        </div>
    </section>
</main>

<footer class="bg-black text-white py-12 mt-auto">
    <div class="max-w-7xl mx-auto px-6 text-center">
        <p class="text-[10px] tracking-widest text-white/30 uppercase">© 2026 KRISTINA BEAUTY | WEDEL</p>
        <div class="mt-8 opacity-50 hover:opacity-100 transition-opacity max-w-xs mx-auto">
             <p class="text-[9px] mb-2 uppercase">Entwickelt von</p>
             <a href="https://github.com/Nicominecith" class="text-brand-gold text-xs">Nicominecith</a>
        </div>
    </div>
</footer>

<script>
    // Navigation Logik
    function navigateTo(pageId) {
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
        const target = document.getElementById('page-' + pageId);
        if (target) {
            target.classList.add('active');
            window.scrollTo(0,0);
            triggerReveals();
        }
    }

    function triggerReveals() {
        const items = document.querySelectorAll('.page-section.active .reveal-item');
        items.forEach((el, i) => {
            setTimeout(() => el.classList.add('revealed'), i * 100);
        });
    }

    // Loader
    window.addEventListener('load', () => {
        setTimeout(() => {
            const loader = document.getElementById('intro-loader');
            loader.classList.add('exiting');
            setTimeout(() => {
                loader.style.display = 'none';
                document.getElementById('navbar').style.opacity = '1';
            }, 700);
        }, 2000);
    });

    // Preislisten-Generator (Deine Daten hier einfügen wie im Original)
    const prices = [
        { cat: "Lashes", items: [{n: "Classic", p: "75€"}, {n: "Volume", p: "85€"}] },
        { cat: "Facials", items: [{n: "Aquafacial", p: "90€"}, {n: "Microneedling", p: "85€"}] }
    ];
    const container = document.getElementById('full-price-list');
    prices.forEach(c => {
        let html = `<div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
            <h3 class="text-brand-gold font-bold uppercase text-[11px] mb-6">${c.cat}</h3>`;
        c.items.forEach(i => {
            html += `<div class="flex justify-between border-b border-gray-50 py-3 text-sm">
                <span>${i.n}</span><span class="font-bold">${i.p}</span>
            </div>`;
        });
        html += `</div>`;
        container.innerHTML += html;
    });
</script>
</body>
</html>
